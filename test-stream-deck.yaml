# Minimal local compile-only test for the stream_deck external component -
# not a real device config (no wifi/api). Run with:
#   esphome compile test-stream-deck.yaml
esphome:
  name: stream-deck-test

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  hardware_uart: UART0

external_components:
  - source:
      type: local
      path: esphome/components
    components: [stream_deck]

stream_deck:
  model: mini # one of: mini, original, original_v2 (alias: mk2)
